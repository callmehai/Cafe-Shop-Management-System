name: csms_mobile
description: Cafe Shop Management System - mobile app (Flutter)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0          # routing (CR-14 điều hướng nhất quán)
  dio: ^5.5.0                 # HTTP client (REST/HTTPS)
  flutter_riverpod: ^2.5.0    # state management
  flutter_secure_storage: ^9.2.0  # lưu JWT an toàn
  intl: ^0.19.0               # format VND, ngày DD/MM/YYYY (CR-02, CR-10)

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
